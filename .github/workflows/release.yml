name: Release

on:
  push:
    tags:
      - 'v*' # 匹配 v1.0.0、v2.1.3 等格式

jobs:
  publish-tauri:
    permissions:
      contents: write # 允许创建 Release 并上传产物

    strategy:
      fail-fast: false # 某平台失败不中止其他平台的构建
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: macos-latest # Apple Silicon (M 系列)
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest # Intel
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node.js & pnpm ──────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 版本从 package.json 的 packageManager 字段读取
        # 若没有该字段，可改为 with: { version: '9' }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      # ── Rust ─────────────────────────────────────────────────────────────
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # ── macOS 额外 target（cross-compile）───────────────────────────────
      - name: Add macOS targets
        if: matrix.platform == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin
          rustup target add x86_64-apple-darwin

      # ── Linux 系统依赖 ───────────────────────────────────────────────────
      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # ── 前端依赖 ─────────────────────────────────────────────────────────
      - name: Install frontend dependencies
        run: pnpm install

      # ── 构建 & 发布 ──────────────────────────────────────────────────────
      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater 签名密钥（必须配置，否则 updater 构建失败）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}         # 使用推送的 tag 名，如 v1.0.0
          releaseName: 'Release ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true   # 先创建草稿，人工确认后再发布
          prerelease: false
          args: ${{ matrix.args }}